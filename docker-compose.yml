version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: fdgsms-mongodb
    restart: unless-stopped
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: FDGadmin
      MONGO_INITDB_ROOT_PASSWORD: fdgmongo123
    volumes:
      - mongo_data:/data/db
    networks:
      - fdgsms-net

  server:
    build: ./server
    container_name: fdgsms-server
    restart: unless-stopped
    ports:
      - "5000:4000"
    environment:
      PORT: 4000
      MONGO_URI: mongodb://FDGadmin:fdgmongo123@mongodb:27017/fdgsms?authSource=admin
      CLIENT_URL: http://76.13.242.148:5175

      JWT_SECRET: gzzpzcMqX7MQMHbO608OjlofodDWiA4FimRMcHMQKM2
      ADMIN_EMAIL: dev.filldesigngroup@gmail.com
      ADMIN_PASSWORD: Testnet1@23!

      TWILIO_ACCOUNT_SID: 
      TWILIO_AUTH_TOKEN: 
      TWILIO_PHONE_NUMBER: 
    depends_on:
      - mongodb
    networks:
      - fdgsms-net

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: http://76.13.242.148:5000
    container_name: fdgsms-client
    restart: unless-stopped
    ports:
      - "5175:3000"
    depends_on:
      - server

networks:
  fdgsms-net:
    driver: bridge

volumes:
  mongo_data:
